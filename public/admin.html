*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f4f4f4;color:#333}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%)}
.login-box{background:#fff;padding:48px 40px;border-radius:12px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{text-align:center;color:#ff6000;font-size:28px;margin-bottom:8px}
.login-box p{text-align:center;color:#888;margin-bottom:32px;font-size:14px}
.login-box label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.login-box input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:18px;outline:none;transition:border .2s}
.login-box input:focus{border-color:#ff6000}
.login-box .btn-login{width:100%;padding:12px;background:#ff6000;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:15px;transition:background .2s}
.login-box .btn-login:hover{background:#e55500}
.login-err{color:#e53e3e;font-size:13px;text-align:center;margin-bottom:12px}
/* LAYOUT */
.layout{display:flex;min-height:100vh}
.sidebar{width:250px;background:#1a1a1a;color:#ccc;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.sidebar .brand{padding:24px 20px;font-size:22px;font-weight:700;color:#ff6000;border-bottom:1px solid #2a2a2a;letter-spacing:-.5px}
.sidebar nav{flex:1;padding:12px 0}
.sidebar .nav-section{padding:8px 20px 4px;font-size:11px;text-transform:uppercase;color:#666;letter-spacing:1px;margin-top:8px}
.sidebar .nav-item{display:flex;align-items:center;padding:10px 20px;cursor:pointer;transition:all .15s;font-size:14px;border-left:3px solid transparent}
.sidebar .nav-item:hover{background:#252525;color:#fff}
.sidebar .nav-item.active{background:#252525;color:#ff6000;border-left-color:#ff6000}
.sidebar .nav-item .icon{width:20px;margin-right:12px;text-align:center;font-size:15px}
.sidebar .back-btn{padding:16px 20px;border-top:1px solid #2a2a2a;cursor:pointer;font-size:14px;transition:color .15s;color:#888}
.sidebar .back-btn:hover{color:#ff6000}
.main{margin-left:250px;flex:1;min-height:100vh}
.topbar{background:#fff;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;position:sticky;top:0;z-index:50}
.topbar h2{font-size:18px;font-weight:600;color:#1a1a1a}
.topbar .user-info{display:flex;align-items:center;gap:12px;font-size:14px;color:#666}
.topbar .user-info .avatar{width:36px;height:36px;border-radius:50%;background:#ff6000;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
.topbar .logout-btn{background:none;border:1px solid #ddd;padding:6px 16px;border-radius:6px;color:#666;font-size:13px;transition:all .2s}
.topbar .logout-btn:hover{border-color:#e53e3e;color:#e53e3e}
.content{padding:28px 32px}
/* CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:28px}
.stat-card{background:#fff;padding:24px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stat-card .label{font-size:13px;color:#888;margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700;color:#1a1a1a}
.stat-card .sub{font-size:12px;color:#22c55e;margin-top:4px}
/* TABLE */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:24px;margin-bottom:24px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.card-header h3{font-size:16px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #eee;font-size:13px;font-weight:600;color:#666;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:14px}
tr:hover td{background:#fafafa}
.badge{padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500;display:inline-block}
.badge-green{background:#dcfce7;color:#166534}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-gray{background:#f3f4f6;color:#374151}
.badge-orange{background:#ffedd5;color:#9a3412}
/* BUTTONS */
.btn{padding:8px 18px;border:none;border-radius:6px;font-weight:500;font-size:13px;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#ff6000;color:#fff}
.btn-primary:hover{background:#e55500}
.btn-secondary{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
.btn-secondary:hover{background:#e5e7eb}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-success{background:#dcfce7;color:#166534}
.btn-success:hover{background:#bbf7d0}
/* FORM */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 14px;border:1px solid #ddd;border-radius:8px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#ff6000}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:28px;width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{margin-bottom:20px;font-size:18px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
/* TOGGLE */
.toggle{width:44px;height:24px;background:#ddd;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:#ff6000}
.toggle .knob{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .knob{left:22px}
/* CHART */
.chart-bar-container{display:flex;align-items:flex-end;gap:8px;height:220px;padding:20px 0}
.chart-bar{background:linear-gradient(to top,#ff6000,#ff8533);border-radius:4px 4px 0 0;min-width:28px;flex:1;position:relative;transition:height .4s}
.chart-bar:hover{opacity:.85}
.chart-bar .chart-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:#888;white-space:nowrap}
.chart-bar .chart-value{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;color:#333}
/* TABS */
.tab-row{display:flex;gap:4px;margin-bottom:20px;background:#f3f4f6;padding:4px;border-radius:8px;width:fit-content}
.tab-btn{padding:8px 18px;border:none;border-radius:6px;background:transparent;font-size:13px;font-weight:500;color:#666;transition:all .2s}
.tab-btn.active{background:#fff;color:#ff6000;box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* DRAG DROP */
.drop-zone{border:2px dashed #ddd;border-radius:12px;padding:48px;text-align:center;color:#888;transition:all .2s;cursor:pointer}
.drop-zone:hover,.drop-zone.drag-over{border-color:#ff6000;background:#fff7ed}
.drop-zone .icon{font-size:36px;margin-bottom:12px}
/* SEARCH */
.search-box{padding:9px 14px;border:1px solid #ddd;border-radius:8px;width:260px;outline:none;transition:border .2s}
.search-box:focus{border-color:#ff6000}
/* STATUS SELECT */
select.status-select{padding:5px 8px;border-radius:6px;border:1px solid #ddd;font-size:13px;outline:none}
/* CHECKBOX */
input[type="checkbox"]{accent-color:#ff6000;width:16px;height:16px;cursor:pointer}
/* GOOGLE PREVIEW */
.google-preview{border:1px solid #eee;border-radius:8px;padding:16px;margin-top:12px;background:#fff}
.google-preview .gp-title{color:#1a0dab;font-size:18px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.google-preview .gp-url{color:#006621;font-size:13px;margin-bottom:4px}
.google-preview .gp-desc{color:#545454;font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Scrollbar for main */
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
/* Responsive */
@media(max-width:768px){.sidebar{width:60px}.sidebar .brand,.sidebar .nav-section,.sidebar .nav-item span,.sidebar .back-btn span{display:none}.sidebar .nav-item{justify-content:center;padding:12px}.sidebar .nav-item .icon{margin:0}.main{margin-left:60px}.content{padding:16px}.stats-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
</style>

/* ──────────── CHARTS ──────────── */
function ChartsTab() {
  const [period, setPeriod] = useState('daily');

  const max = Math.max(...data.map(d=>d.value));

/* ──────────── PRODUCTS ──────────── */
function ProductsTab({products, setProducts, categories}) {
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState([]);
  const [form, setForm] = useState({name:'',cat:'',price:'',brand:'',stock:'',sku:''});

  const filtered = products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()) || p.sku.toLowerCase().includes(search.toLowerCase()));

  const openAdd = () => {setForm({name:'',cat:categories[0]?.slug||'',price:'',brand:'',stock:'',sku:''});setModal('add')};
  const openEdit = (p) => {setForm({...p,price:String(p.price),stock:String(p.stock)});setModal('edit')};
  const saveProduct = () => {
    if(!form.name) return;
    if(modal==='add'){
      setProducts([...products,{...form,id:Date.now(),price:Number(form.price),stock:Number(form.stock)}]);
    } else {
      setProducts(products.map(p=>p.id===form.id?{...form,price:Number(form.price),stock:Number(form.stock)}:p));
    }
    setModal(null);
  };
  const deleteProduct = (id) => {setProducts(products.filter(p=>p.id!==id));setSelected(selected.filter(s=>s!==id))};
  const deleteSelected = () => {setProducts(products.filter(p=>!selected.includes(p.id)));setSelected([])};
  const toggleSelect = (id) => setSelected(selected.includes(id)?selected.filter(s=>s!==id):[...selected,id]);
  const toggleAll = () => setSelected(selected.length===filtered.length?[]:filtered.map(p=>p.id));

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <h3>Ürün Listesi ({filtered.length})</h3>
          <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
            <input className="search-box" placeholder="Ürün veya SKU ara..." value={search} onChange={e=>setSearch(e.target.value)}/>
            {selected.length>0 && <button className="btn btn-danger" onClick={deleteSelected}>Seçilenleri Sil ({selected.length})</button>}
            <button className="btn btn-primary" onClick={openAdd}>+ Yeni Ürün</button>
          </div>
        </div>
        <table>
          <thead><tr><th><input type="checkbox" checked={selected.length===filtered.length && filtered.length>0} onChange={toggleAll}/></th><th>SKU</th><th>Ürün Adı</th><th>Kategori</th><th>Marka</th><th>Fiyat</th><th>Stok</th><th>İşlem</th></tr></thead>
          <tbody>
            {filtered.map(p=>(
              <tr key={p.id}>
                <td><input type="checkbox" checked={selected.includes(p.id)} onChange={()=>toggleSelect(p.id)}/></td>
                <td style={{fontFamily:'monospace',fontSize:'12px'}}>{p.sku}</td>
                <td>{p.name}</td><td>{p.cat}</td><td>{p.brand}</td>
                <td>{fmtCurrency(p.price)}</td>
                <td><span className={`badge ${p.stock===0?'badge-red':p.stock<10?'badge-yellow':'badge-green'}`}>{p.stock}</span></td>
                <td>
                  <button className="btn btn-secondary btn-sm" onClick={()=>openEdit(p)} style={{marginRight:'6px'}}>Düzenle</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>deleteProduct(p.id)}>Sil</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>{modal==='add'?'Yeni Ürün Ekle':'Ürün Düzenle'}</h3>
            <div className="form-group"><label>Ürün Adı</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div className="form-row">
              <div className="form-group"><label>Kategori</label>
                <select value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})}>
                  {categories.map(c=><option key={c.id} value={c.slug}>{c.name}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Marka</label><input value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})}/></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Fiyat (₺)</label><input type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/></div>
              <div className="form-group"><label>Stok</label><input type="number" value={form.stock} onChange={e=>setForm({...form,stock:e.target.value})}/></div>
            </div>
            <div className="form-group"><label>SKU</label><input value={form.sku} onChange={e=>setForm({...form,sku:e.target.value})}/></div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>setModal(null)}>İptal</button>
              <button className="btn btn-primary" onClick={saveProduct}>{modal==='add'?'Ekle':'Kaydet'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ──────────── CATEGORIES ──────────── */
function CategoriesTab({categories, setCategories}) {
  const [newCat, setNewCat] = useState('');
  const addCategory = () => {
    if(!newCat.trim()) return;
    setCategories([...categories,{id:Date.now(),name:newCat,slug:newCat.toLowerCase().replace(/\s+/g,'-').replace(/[öÖ]/g,'o').replace(/[üÜ]/g,'u').replace(/[şŞ]/g,'s').replace(/[çÇ]/g,'c').replace(/[ğĞ]/g,'g').replace(/[ıİ]/g,'i'),count:0}]);
    setNewCat('');
  };
  const deleteCat = (id) => setCategories(categories.filter(c=>c.id!==id));
  return (
    <div className="card">
      <div className="card-header">
        <h3>Kategoriler ({categories.length})</h3>
        <div style={{display:'flex',gap:'10px'}}>
          <input className="search-box" placeholder="Yeni kategori adı..." value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCategory()} style={{width:'220px'}}/>

            <tr key={c.id}>
              <td>{c.id}</td><td style={{fontWeight:500}}>{c.name}</td><td style={{fontFamily:'monospace',fontSize:'13px',color:'#888'}}>{c.slug}</td><td>{c.count}</td>

          ))}

/* ──────────── ORDERS ──────────── */
function OrdersTab({orders, setOrders}) {
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const statuses = ['Hazırlanıyor','Kargoda','Teslim Edildi','İptal'];
  const statusColor = s => ({Hazırlanıyor:'badge-yellow',Kargoda:'badge-blue','Teslim Edildi':'badge-green',İptal:'badge-red'}[s]||'badge-gray');
  const updateStatus = (id, status) => setOrders(orders.map(o=>o.id===id?{...o,status}:o));
  const filtered = orders.filter(o => {
    const matchSearch = !search || o.customer.toLowerCase().includes(search.toLowerCase()) || String(o.id).includes(search);
    const matchStatus = !filterStatus || o.status === filterStatus;
    return matchSearch && matchStatus;
  });
  return (

      <div className="card-header">

            <option value="">Tüm Durumlar</option>
            {statuses.map(s=><option key={s} value={s}>{s}</option>)}

      </div>
      <table>
        <thead><tr><th>#</th><th>Müşteri</th><th>E-posta</th><th>Ürünler</th><th>Tutar</th><th>Durum</th><th>Tarih</th></tr></thead>
        <tbody>
          {filtered.map(o=>(
            <tr key={o.id}>
              <td style={{fontWeight:600}}>{o.id}</td><td>{o.customer}</td><td style={{color:'#888',fontSize:'13px'}}>{o.email}</td>
              <td style={{fontSize:'13px',maxWidth:'250px'}}>{o.items}</td>
              <td style={{fontWeight:600}}>{fmtCurrency(o.total)}</td>
              <td>
                <select className="status-select" value={o.status} onChange={e=>updateStatus(o.id,e.target.value)}

                  {statuses.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </td>
              <td>{o.date}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

    setForm({code:'',discount:'',type:'percent',minOrder:'',usageLimit:'',expiry:''});
  };
  const toggleCoupon = (id) => setCoupons(coupons.map(c=>c.id===id?{...c,active:!c.active}:c));

/* ──────────── LOW STOCK ──────────── */

        <thead><tr><th>SKU</th><th>Ürün</th><th>Marka</th><th>Mevcut Stok</th><th>İşlem</th></tr></thead>

              <td style={{fontWeight:500}}>{p.name}</td>
              <td>{p.brand}</td>

/* ──────────── BULK PRICE ──────────── */
function BulkPriceTab({products, setProducts}) {
  const [percentage, setPercentage] = useState('');
  const [direction, setDirection] = useState('increase');
  const [catFilter, setCatFilter] = useState('');
  const [applied, setApplied] = useState(false);

  const uniqueCats = [...new Set(products.map(p=>p.cat))];
  const affected = catFilter ? products.filter(p=>p.cat===catFilter) : products;

  const applyPrice = () => {
    const pct = Number(percentage);
    if(!pct || pct<=0) return;
    const multiplier = direction==='increase' ? (1 + pct/100) : (1 - pct/100);
    setProducts(products.map(p=> {
      if(catFilter && p.cat!==catFilter) return p;
      return {...p, price: Math.round(p.price * multiplier)};
    }));
    setApplied(true);
    setTimeout(()=>setApplied(false), 3000);
  };

  return (
    <div>
      <div className="card">
        <div className="card-header"><h3>Toplu Fiyat Güncelleme</h3></div>
        <div style={{display:'flex',gap:'16px',alignItems:'flex-end',flexWrap:'wrap',marginBottom:'20px'}}>
          <div className="form-group" style={{marginBottom:0}}>
            <label>Kategori</label>
            <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{padding:'9px 14px',border:'1px solid #ddd',borderRadius:'8px',minWidth:'160px'}}>
              <option value="">Tüm Kategoriler</option>
              {uniqueCats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label>İşlem</label>
            <select value={direction} onChange={e=>setDirection(e.target.value)} style={{padding:'9px 14px',border:'1px solid #ddd',borderRadius:'8px'}}>
              <option value="increase">Artır</option>
              <option value="decrease">Azalt</option>
            </select>
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label>Yüzde (%)</label>
            <input type="number" value={percentage} onChange={e=>setPercentage(e.target.value)} placeholder="10" style={{width:'100px',padding:'9px 14px',border:'1px solid #ddd',borderRadius:'8px'}}/>
          </div>
          <button className="btn btn-primary" onClick={applyPrice}>Uygula ({affected.length} ürün)</button>
          {applied && <span style={{color:'#16a34a',fontWeight:500,fontSize:'14px'}}>Fiyatlar güncellendi!</span>}
        </div>
        <table>
          <thead><tr><th>Ürün</th><th>Kategori</th><th>Mevcut Fiyat</th><th>Tahmini Yeni Fiyat</th></tr></thead>
          <tbody>
            {affected.map(p=>{
              const pct = Number(percentage)||0;
              const mult = direction==='increase'?(1+pct/100):(1-pct/100);
              const newPrice = Math.round(p.price*mult);
              return (
                <tr key={p.id}>
                  <td style={{fontWeight:500}}>{p.name}</td><td>{p.cat}</td>
                  <td>{fmtCurrency(p.price)}</td>
                  <td style={{fontWeight:600,color:direction==='increase'?'#dc2626':'#16a34a'}}>{pct?fmtCurrency(newPrice):'-'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ──────────── XML / EXCEL ──────────── */
function XmlExcelTab() {
  const [dragOver, setDragOver] = useState(false);
  const [files, setFiles] = useState([]);
  const [importing, setImporting] = useState(false);
  const fileRef = useRef();

  const handleDrop = (e) => {
    e.preventDefault();setDragOver(false);
    const droppedFiles = Array.from(e.dataTransfer.files);
    setFiles(droppedFiles);
  };
  const handleFileSelect = (e) => {
    setFiles(Array.from(e.target.files));
  };
  const simulateImport = () => {
    setImporting(true);
    setTimeout(()=>setImporting(false), 2000);
  };

  return (
    <div className="card">
      <div className="card-header"><h3>XML / Excel İçe Aktarma</h3></div>
      <div className={`drop-zone ${dragOver?'drag-over':''}`}
        onDragOver={e=>{e.preventDefault();setDragOver(true)}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={handleDrop}
        onClick={()=>fileRef.current.click()}>
        <div className="icon">📁</div>
        <p style={{fontSize:'16px',fontWeight:500,marginBottom:'8px'}}>Dosyayı sürükleyip bırakın</p>
        <p style={{fontSize:'13px'}}>veya tıklayarak seçin</p>
        <p style={{fontSize:'12px',color:'#aaa',marginTop:'12px'}}>Desteklenen formatlar: .xml, .xlsx, .xls, .csv</p>
        <input ref={fileRef} type="file" accept=".xml,.xlsx,.xls,.csv" style={{display:'none'}} onChange={handleFileSelect} multiple/>
      </div>
      {files.length>0 && (
        <div style={{marginTop:'20px'}}>
          <h4 style={{marginBottom:'12px',fontSize:'14px'}}>Seçilen Dosyalar:</h4>
          {files.map((f,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px',background:'#f9fafb',borderRadius:'6px',marginBottom:'8px'}}>
              <span>📄</span>
              <span style={{flex:1,fontSize:'14px'}}>{f.name}</span>
              <span style={{fontSize:'12px',color:'#888'}}>{(f.size/1024).toFixed(1)} KB</span>
              <button className="btn btn-danger btn-sm" onClick={()=>setFiles(files.filter((_,j)=>j!==i))}>Kaldır</button>
            </div>
          ))}
          <button className="btn btn-primary" onClick={simulateImport} disabled={importing} style={{marginTop:'12px'}}>
            {importing ? 'İçe aktarılıyor...' : 'İçe Aktar'}
          </button>
        </div>
      )}
      <div style={{marginTop:'24px',padding:'16px',background:'#f9fafb',borderRadius:'8px'}}>
        <h4 style={{fontSize:'14px',marginBottom:'8px'}}>İçe Aktarma Formatı</h4>
        <p style={{fontSize:'13px',color:'#666',lineHeight:1.6}}>
          XML veya Excel dosyanızda şu sütunlar bulunmalıdır:<br/>
          <code style={{background:'#e5e7eb',padding:'2px 6px',borderRadius:'4px',fontSize:'12px'}}>SKU, Ürün Adı, Kategori, Marka, Fiyat, Stok</code>
        </p>
      </div>
    </div>
  );
}

/* ──────────── CHAT HISTORY ──────────── */
function ChatHistoryTab() {
  const AUTH = 'Bearer frenciniz-admin-2026';
  const [sessions, setSessions] = useState([]);
  const [activeChat, setActiveChat] = useState(null);
  const [messages, setMessages] = useState([]);
  const [reply, setReply] = useState('');
  const [sending, setSending] = useState(false);
  const [loading, setLoading] = useState(true);
  const messagesEndRef = useRef(null);

  // Oturumları yükle
  const loadSessions = () => {
    fetch('/api/chat/sessions', {headers:{Authorization:AUTH}})
      .then(r=>r.json())
      .then(d=>{setSessions(d.sessions||[]);setLoading(false)})
      .catch(()=>setLoading(false));
  };

  // Mesajları yükle
  const loadMessages = (sid) => {
    fetch('/api/chat/messages?sessionId='+sid, {headers:{Authorization:AUTH}})
      .then(r=>r.json())
      .then(d=>setMessages(d.messages||[]))
      .catch(()=>{});
  };

  useEffect(()=>{loadSessions()}, []);

  // Aktif chat değişince mesajları yükle + polling
  useEffect(()=>{
    if(!activeChat) return;
    loadMessages(activeChat);
    const iv = setInterval(()=>{loadMessages(activeChat);loadSessions()}, 4000);
    return ()=>clearInterval(iv);
  }, [activeChat]);

  // Scroll to bottom
  useEffect(()=>{
    messagesEndRef.current?.scrollIntoView({behavior:'smooth'});
  }, [messages]);

  const sendReply = () => {
    if(!reply.trim()||!activeChat) return;
    setSending(true);
    fetch('/api/chat/reply', {
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:AUTH},
      body:JSON.stringify({sessionId:activeChat, message:reply})
    }).then(()=>{
      setReply('');
      setSending(false);
      loadMessages(activeChat);
      loadSessions();
    }).catch(()=>setSending(false));
  };

  const formatTime = (t) => {
    if(!t) return '';
    const d = new Date(t);
    return d.toLocaleString('tr-TR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
  };

  const current = sessions.find(s=>s.id===activeChat);

  return (
    <div className="card">
      <div className="card-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <h3>Canlı Chat ({sessions.length} sohbet)</h3>
        <button onClick={loadSessions} style={{padding:'6px 14px',border:'1px solid #ddd',borderRadius:'6px',background:'#fff',fontSize:'12px',cursor:'pointer'}}>🔄 Yenile</button>
      </div>
      <div style={{display:'flex',gap:'0',minHeight:'500px'}}>
        {/* Sol: Oturum listesi */}
        <div style={{width:'280px',borderRight:'1px solid #eee',overflowY:'auto',maxHeight:'500px'}}>
          {loading && <div style={{padding:'24px',textAlign:'center',color:'#888'}}>Yükleniyor...</div>}
          {!loading && sessions.length===0 && <div style={{padding:'24px',textAlign:'center',color:'#888',fontSize:'13px'}}>Henüz chat yok.<br/>Müşteriler sitedeki chat widget'ından mesaj gönderince burada görünür.</div>}
          {sessions.map(s=>(
            <div key={s.id}
              onClick={()=>setActiveChat(s.id)}
              style={{padding:'14px 16px',cursor:'pointer',borderBottom:'1px solid #f0f0f0',background:activeChat===s.id?'#fff7ed':'#fff',transition:'background .15s'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
                <span style={{fontWeight:600,fontSize:'13px'}}>🧑 {s.id?.slice(0,12)}...</span>
                {s.unread>0 && <span style={{background:'#ff6000',color:'#fff',borderRadius:'10px',padding:'2px 8px',fontSize:'11px',fontWeight:700}}>{s.unread}</span>}
              </div>
              <div style={{fontSize:'12px',color:'#888'}}>{formatTime(s.lastTime)}</div>
              <div style={{fontSize:'12px',color:'#555',marginTop:'4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.lastMessage||''}</div>
              <div style={{fontSize:'11px',color:'#bbb',marginTop:'2px'}}>{s.messageCount||0} mesaj</div>
            </div>
          ))}
        </div>

        {/* Sağ: Mesajlar + yanıt */}
        <div style={{flex:1,display:'flex',flexDirection:'column'}}>
          {!activeChat && <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'#888',fontSize:'14px'}}>Bir sohbet seçin</div>}
          {activeChat && (
            <>
              {/* Mesajlar */}
              <div style={{flex:1,overflowY:'auto',padding:'16px',background:'#f9f9f9',maxHeight:'380px'}}>
                {messages.map((m,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:m.from==='user'?'flex-start':m.from==='admin'?'flex-end':'flex-start',marginBottom:'10px'}}>
                    <div style={{maxWidth:'70%',padding:'10px 14px',borderRadius:m.from==='user'?'12px 12px 12px 4px':m.from==='admin'?'12px 12px 4px 12px':'12px 12px 12px 4px',background:m.from==='admin'?'#ff6000':m.from==='bot'?'#e8e8e8':'#fff',color:m.from==='admin'?'#fff':'#333',fontSize:'13px',lineHeight:'1.5',whiteSpace:'pre-line',boxShadow:'0 1px 2px rgba(0,0,0,.05)'}}>
                      {m.from==='bot' && <div style={{fontSize:'10px',color:'#888',marginBottom:'4px'}}>🤖 Bot</div>}
                      {m.from==='user' && <div style={{fontSize:'10px',color:'#888',marginBottom:'4px'}}>🧑 Müşteri</div>}
                      {m.from==='admin' && <div style={{fontSize:'10px',color:'rgba(255,255,255,.7)',marginBottom:'4px'}}>👤 Admin</div>}
                      <div>{m.text}</div>
                      <div style={{fontSize:'10px',marginTop:'4px',opacity:.6,textAlign:'right'}}>{formatTime(m.time)}</div>
                    </div>
                  </div>
                ))}
                <div ref={messagesEndRef}/>
              </div>

              {/* Yanıt kutusu */}
              <div style={{padding:'12px 16px',borderTop:'1px solid #eee',display:'flex',gap:'8px',background:'#fff'}}>
                <input value={reply}
                  onChange={e=>setReply(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey)sendReply()}}
                  placeholder="Yanıt yazın..."
                  style={{flex:1,padding:'10px 14px',border:'1px solid #ddd',borderRadius:'8px',fontSize:'13px',outline:'none'}}/>
                <button onClick={sendReply} disabled={sending||!reply.trim()}
                  style={{padding:'10px 20px',background:sending?'#ccc':'#ff6000',color:'#fff',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:600,cursor:sending?'default':'pointer'}}>
                  {sending?'...':'Gönder'}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ──────────── REVENUE ──────────── */
function RevenueTab() {
  const [period, setPeriod] = useState('monthly');
  const monthlyData = [
    {month:'Ocak',revenue:85000,expense:32000},{month:'Şubat',revenue:92000,expense:35000},{month:'Mart',revenue:78000,expense:29000},
    {month:'Nisan',revenue:105000,expense:41000},{month:'Mayıs',revenue:98000,expense:38000},{month:'Haziran',revenue:112000,expense:44000},
  ];
  const quarterlyData = [
    {month:'Q1 (Oca-Mar)',revenue:255000,expense:96000},
    {month:'Q2 (Nis-Haz)',revenue:315000,expense:123000},
  ];
  const data = period==='monthly'?monthlyData:quarterlyData;
  const totalRevenue = data.reduce((s,d)=>s+d.revenue,0);
  const totalExpense = data.reduce((s,d)=>s+d.expense,0);

  return (
    <div>
      <div className="stats-grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
        <div className="stat-card"><div className="label">Toplam Gelir</div><div className="value" style={{color:'#16a34a'}}>{fmtCurrency(totalRevenue)}</div></div>
        <div className="stat-card"><div className="label">Toplam Gider</div><div className="value" style={{color:'#dc2626'}}>{fmtCurrency(totalExpense)}</div></div>
        <div className="stat-card"><div className="label">Net Kar</div><div className="value" style={{color:'#ff6000'}}>{fmtCurrency(totalRevenue-totalExpense)}</div></div>
      </div>
      <div className="card">
        <div className="card-header">
          <h3>Gelir/Gider Raporu</h3>
          <div className="tab-row">
            <button className={`tab-btn ${period==='monthly'?'active':''}`} onClick={()=>setPeriod('monthly')}>Aylık</button>
            <button className={`tab-btn ${period==='quarterly'?'active':''}`} onClick={()=>setPeriod('quarterly')}>Çeyreklik</button>
          </div>
        </div>
        <table>
          <thead><tr><th>Dönem</th><th>Gelir</th><th>Gider</th><th>Net Kar</th><th>Kar Marjı</th></tr></thead>
          <tbody>
            {data.map((d,i)=>(
              <tr key={i}>
                <td style={{fontWeight:500}}>{d.month}</td>
                <td style={{color:'#16a34a',fontWeight:600}}>{fmtCurrency(d.revenue)}</td>
                <td style={{color:'#dc2626',fontWeight:600}}>{fmtCurrency(d.expense)}</td>
                <td style={{fontWeight:700}}>{fmtCurrency(d.revenue-d.expense)}</td>
                <td><span className="badge badge-green">{Math.round((d.revenue-d.expense)/d.revenue*100)}%</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ──────────── ADMIN MANAGEMENT ──────────── */
function AdminManagementTab({admins, setAdmins}) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({name:'',email:'',role:'Editör',password:''});

  const addAdmin = () => {
    if(!form.name||!form.email) return;
    setAdmins([...admins,{...form,id:Date.now(),lastLogin:'Henüz giriş yapmadı'}]);
    setModal(false);
    setForm({name:'',email:'',role:'Editör',password:''});
  };
  const deleteAdmin = (id) => {
    if(admins.find(a=>a.id===id)?.role==='Süper Admin') return;
    setAdmins(admins.filter(a=>a.id!==id));
  };
  const roleColor = r => ({'Süper Admin':'badge-red',Editör:'badge-blue',Destek:'badge-green'}[r]||'badge-gray');

  return (
    <div>
      <div className="card">
        <div className="card-header">
          <h3>Admin Yönetimi ({admins.length})</h3>
          <button className="btn btn-primary" onClick={()=>setModal(true)}>+ Yeni Admin</button>
        </div>
        <table>
          <thead><tr><th>Ad Soyad</th><th>E-posta</th><th>Rol</th><th>Son Giriş</th><th>İşlem</th></tr></thead>
          <tbody>
            {admins.map(a=>(
              <tr key={a.id}>
                <td style={{fontWeight:500}}>{a.name}</td><td>{a.email}</td>
                <td><span className={`badge ${roleColor(a.role)}`}>{a.role}</span></td>
                <td style={{fontSize:'13px',color:'#888'}}>{a.lastLogin}</td>
                <td>
                  {a.role!=='Süper Admin' && <button className="btn btn-danger btn-sm" onClick={()=>deleteAdmin(a.id)}>Sil</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <div className="modal-overlay" onClick={()=>setModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>Yeni Admin Ekle</h3>
            <div className="form-group"><label>Ad Soyad</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div className="form-group"><label>E-posta</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
            <div className="form-group"><label>Şifre</label><input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/></div>
            <div className="form-group"><label>Rol</label>
              <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                <option>Editör</option><option>Destek</option><option>Süper Admin</option>
              </select>
            </div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={()=>setModal(false)}>İptal</button>
              <button className="btn btn-primary" onClick={addAdmin}>Ekle</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        <div className="form-group"><label>E-posta</label><input value={settings.email} onChange={e=>update('email',e.target.value)}/></div>
      </div>
      <div className="form-group"><label>Adres</label><textarea rows={2} value={settings.address} onChange={e=>update('address',e.target.value)}/></div>

      <h4 style={{fontSize:'15px',marginTop:'24px',marginBottom:'16px',paddingTop:'16px',borderTop:'1px solid #eee'}}>Sosyal Medya</h4>
      <div className="form-row">
        <div className="form-group"><label>Facebook</label><input value={settings.facebook} onChange={e=>update('facebook',e.target.value)}/></div>
        <div className="form-group"><label>Instagram</label><input value={settings.instagram} onChange={e=>update('instagram',e.target.value)}/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Twitter / X</label><input value={settings.twitter} onChange={e=>update('twitter',e.target.value)}/></div>
        <div className="form-group"><label>YouTube</label><input value={settings.youtube} onChange={e=>update('youtube',e.target.value)}/></div>

      <h4 style={{fontSize:'15px',marginTop:'24px',marginBottom:'16px',paddingTop:'16px',borderTop:'1px solid #eee'}}>Kargo</h4>
      <div className="form-group"><label>Ücretsiz Kargo Limiti (₺)</label><input type="number" value={settings.freeShippingLimit} onChange={e=>update('freeShippingLimit',e.target.value)} style={{width:'200px'}}/></div>

      <div style={{marginTop:'20px',display:'flex',gap:'10px',alignItems:'center'}}>
        <button className="btn btn-primary" onClick={save}>Kaydet</button>
        {saved && <span style={{color:'#16a34a',fontWeight:500,fontSize:'14px'}}>Ayarlar kaydedildi!</span>}
      </div>
    </div>
  );
}

/* ──────────── ACTIVITY LOG ──────────── */
function ActivityLogTab() {
  const typeColor = t => ({create:'badge-green',update:'badge-blue',delete:'badge-red',system:'badge-orange'}[t]||'badge-gray');
  const typeLabel = t => ({create:'Oluşturma',update:'Güncelleme',delete:'Silme',system:'Sistem'}[t]||t);
  return (
    <div className="card">
      <div className="card-header"><h3>Aktivite Logu</h3></div>
      <table>
        <thead><tr><th>Tarih</th><th>Kullanıcı</th><th>İşlem</th><th>Tür</th></tr></thead>
        <tbody>
          {ACTIVITY_LOG.map(a=>(
            <tr key={a.id}>

              <td style={{fontWeight:500}}>{a.user}</td>
