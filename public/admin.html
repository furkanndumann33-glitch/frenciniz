<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<meta http-equiv="refresh" content="0; url=/?admin=1"/>
<title>Yönlendiriliyor — Frenciniz Yönetim</title>
<style>
  body{margin:0;font-family:'Inter','Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a1a,#2d2d2d);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .box{text-align:center;padding:40px}
  .box h1{color:#ff6000;font-size:28px;margin:0 0 8px}
  .box p{color:#aaa;margin:4px 0;font-size:14px}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,96,0,.2);border-top-color:#ff6000;border-radius:50%;margin:24px auto;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#ff6000;text-decoration:none}
</style>
</head>
<body>
  <div class="box">
    <h1>Frenciniz Yönetim</h1>
    <div class="spinner"></div>
    <p>Yeni admin paneline yönlendiriliyorsunuz…</p>
    <p style="margin-top:16px"><a href="/">Yönlendirilmediyseniz buraya tıklayın</a></p>
  </div>
  <script>location.replace('/?admin=1');</script>
</body>
</html>
