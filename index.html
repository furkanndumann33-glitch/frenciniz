      <h1>Frenciniz - Ağır Vasıta Fren Aksamı ve Yedek Parça | Isparta</h1>
      <p><strong>Frenciniz</strong> (Dumanlar Ticaret); kamyon, tır, otobüs, dorse ve treylerler için
        <strong>ECE R-90 sertifikalı</strong> orijinal ve eşdeğer fren aksamı satışı yapan Isparta merkezli
        ağır vasıta yedek parça uzmanıdır. 1000'i aşkın stoklu ürün ile Türkiye geneli aynı gün kargo
        hizmeti sunar.</p>

      <h2>Ürün Kategorilerimiz</h2>
      <ul>
        <li><strong>Fren Diski</strong> — Mercedes Actros, MAN TGA/TGS/TGX, Volvo FH/FM, Scania, DAF, Iveco uyumlu</li>
        <li><strong>Fren Balatası</strong> — Disk balatası, kampana balatası, ön/arka, dorse balatası</li>
        <li><strong>Fren Kampanası</strong> — BPW, SAF, Schmitz, Krone dorse uyumlu</li>
        <li><strong>Fren Körüğü</strong> — Tip 24/30, çift/tek diyaframlı, hava körüğü</li>
        <li><strong>Süspansiyon Körüğü</strong> — Hava süspansiyon körüğü, yastık tip</li>
        <li><strong>Kaliper ve Tamir Takımı</strong> — Knorr-Bremse, Wabco, Haldex tipi</li>
        <li><strong>EBS Modülatör ve ABS Sensörü</strong> — Elektronik fren sistemi parçaları</li>
        <li><strong>Bijon, Porya, Fren Ayarlayıcı, Mil Keçesi</strong> ve diğer fren grubu parçaları</li>
      </ul>

      <h2>Marka ve Araç Uyumluluğu</h2>
      <p>Mercedes-Benz Actros, Axor, Atego; MAN TGA, TGS, TGX, TGL; Volvo FH, FM; Scania R, G, P;
        DAF XF, CF, LF; Iveco Stralis, Eurocargo, Daily; Renault Premium, Magnum; Ford Cargo;
        BMC; ve dorse markaları olan BPW, SAF, Schmitz Cargobull, Krone, Tirsan, Wielton, Otokar Land Trans
        için uyumlu fren parçaları stoklarımızda mevcuttur.</p>
